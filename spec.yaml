id: mnc_logistics_report
requirements:
  - name: ecoscope-workflows-core
    version: "0.22.18.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: "0.22.18.*"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.43.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.18.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-mnc
    version: "0.0.8.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
    
workflow:
  - name: Set workflow details
    id: workflow_details
    task: set_workflow_details

  - name: Time range
    id: time_range
    task: set_time_range
      
  - name: Set groupers
    id: groupers
    task: set_groupers
    partial: 
      groupers: []

  - name: Connect to ER 
    id: er_client_name
    task: set_er_connection

  # Get  Events 
  - name: Retrieve all events 
    id: get_events_data
    task: get_events
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      client: ${{ workflow.er_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      event_columns:
        - id
        - time
        - event_type
        - event_category
        - reported_by
        - serial_number
        - geometry
        - created_at
        - event_details
        - patrols
      event_types: [
        "balloon_landing",
        "airstrip_operations",
        "airstrip_maintenance",
        "airline_complaint"
        ]
      raise_on_empty: true
      include_details: true
      include_updates: false
      include_related_events: false
      include_null_geometry: false
      include_display_values: false

  # Extract date
  - name: Extract date from events data
    id: extract_event_date
    task: extract_column_as_type
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.get_events_data.return }}
      column_name: time
      output_type: date
      output_column_name: date

  - name: Add temporal index on events
    id: events_temporal
    task: add_temporal_index
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.extract_event_date.return }}
      time_col: date
      groupers: ${{ workflow.groupers.return }}
      cast_to_datetime: true
      format: mixed

  - name: Filter events and get balloon sighting records 
    id: filter_balloon_events
    task: filter_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column_name: event_type	
      op: equal
      value: balloon_landing
      df: ${{ workflow.events_temporal.return }}
      reset_index: false

  - name: Filter events and get airstrip operation records 
    id: filter_airstrip_operations
    task: filter_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column_name: event_type	
      op: equal
      value: airstrip_operations
      df: ${{ workflow.events_temporal.return }}
      reset_index: false

  - name: Filter events and get airstrip maintenance records 
    id: filter_airstrip_maintenance
    task: filter_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column_name: event_type	
      op: equal
      value: airstrip_maintenance
      df: ${{ workflow.events_temporal.return }}
      reset_index: false
  
  - name: Filter events and get airline complaint records 
    id: filter_airline_complaints
    task: filter_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column_name: event_type	
      op: equal
      value: airline_complaint
      df: ${{ workflow.events_temporal.return }}
      reset_index: false

  - name: Process balloon event details 
    id: process_balloon_details
    task: process_events_details 
    partial: 
      df: ${{ workflow.filter_balloon_events.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true 

  - name: Normalize balloon event details values
    id: normalize_balloon_values
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      column: event_details
      df: ${{ workflow.process_balloon_details.return }}
      skip_if_not_exists: true 
      sort_columns: true 
  
  - name: Drop column prefix from balloon event details s
    id: drop_balloon_prefix 
    task: drop_column_prefix 
    partial:
      df: ${{ workflow.normalize_balloon_values.return }}
      prefix: event_details__
      duplicate_strategy: "keep_original"
  
  - name: Process airstrip operation event details 
    id: process_airstrip_details
    task: process_events_details 
    partial: 
      df: ${{ workflow.filter_airstrip_operations.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true
  
  - name: Normalize airstrip operation event details values
    id: normalize_airstrip_op_values
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      column: event_details
      df: ${{ workflow.process_airstrip_details.return }}
      skip_if_not_exists: true 
      sort_columns: true
    
  - name: Drop column prefix from airstrip operation event details 
    id: drop_airstrip_op_prefix 
    task: drop_column_prefix 
    partial:
      df: ${{ workflow.normalize_airstrip_op_values.return }}
      prefix: event_details__
      duplicate_strategy: "keep_original"

  - name: Process airstrip maintenance event details 
    id: process_airstrip_maint_details
    task: process_events_details 
    partial: 
      df: ${{ workflow.filter_airstrip_maintenance.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true
  
  - name: Normalize airstrip maintenance event details values
    id: normalize_airstrip_maint_vals
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      column: event_details
      df: ${{ workflow.process_airstrip_maint_details.return }}
      skip_if_not_exists: true 
      sort_columns: true
  
  - name: Drop column prefix from airstrip maintenance event details 
    id: drop_airstrip_maintenance_prefix 
    task: drop_column_prefix 
    partial:
      df: ${{ workflow.normalize_airstrip_maint_vals.return }}
      prefix: event_details__
      duplicate_strategy: "keep_original"

  - name: Process airline complaint event details 
    id: process_airline_comp_details
    task: process_events_details 
    partial: 
      df: ${{ workflow.filter_airline_complaints.return }}
      client: ${{ workflow.er_client_name.return }}
      map_to_titles: true 
      ordered: true
  
  - name: Normalize airline complaint event details values
    id: normalize_airline_comp_vals
    task: normalize_json_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      column: event_details
      df: ${{ workflow.process_airline_comp_details.return }}
      skip_if_not_exists: true 
      sort_columns: true

  - name: Drop column prefix from airline complaint event details 
    id: drop_airline_complaint_prefix 
    task: drop_column_prefix 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.normalize_airline_comp_vals.return }}
      prefix: event_details__
      duplicate_strategy: "keep_original"

  - name: Map balloon columns 
    id: map_balloon_columns 
    task: map_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.drop_balloon_prefix.return }}
      drop_columns: []
      retain_columns: [
        "date",
        "Balloon Company",
        "Where are clients staying?",
        "# of passengers"
      ]
      rename_columns: {
        "Balloon Company": "balloon_company",
        "Where are clients staying?": "where_are_clients_staying",
        "# of passengers":"no_of_passengers"
        }
      raise_if_not_found: false

  - name: Remove brackets from columns in balloon events 
    id: remove_balloon_brackets 
    task: remove_brackets_from_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.map_balloon_columns.return }}
      columns:
        - balloon_company
        - where_are_clients_staying

  - name: Persist balloon landing summary table 
    id: persist_balloon_landing
    task: persist_df
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.remove_balloon_brackets.return }}
      filename: balloon_landing_summary_table

  # map airstrip operations 
  - name: Map airstrip operation columns 
    id: map_airstrip_op_columns 
    task: map_columns
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial: 
      df: ${{ workflow.drop_airstrip_op_prefix.return }}
      drop_columns: []
      retain_columns: []
      rename_columns: {
        "Airline":"airline",
        "Arrival or departure":"arrival_departure",
        "Attendant":"attendant",
        "Camp/Lodge":"camp_lodge",
        "Number of clients":"no_of_clients"
        }
      raise_if_not_found: false

  - name: Remove brackets from columns in airstrip operation events 
    id: remove_airstrip_op_brackets 
    task: remove_brackets_from_column
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.map_airstrip_op_columns.return }}
      columns:
        - airline
        - arrival_departure
        - attendant
        - camp_lodge

  - name: Replace missing values in camp_lodge column with other
    id: replace_airstrip_op_nulls
    task: replace_missing_with_label
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.remove_airstrip_op_brackets.return }}
      columns: 
        - camp_lodge
      label: other

  - name: Convert columns to integer 
    id: convert_airstrip_op_ints
    task: convert_to_int
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.replace_airstrip_op_nulls.return }}
      columns:
        - no_of_clients
      errors: coerce
      fill_value: 0
      inplace: false
  
  - name: Capitalize text in camp_lodge column 
    id: capitalize_camp_lodge
    task: capitalize_text
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.convert_airstrip_op_ints.return }}
      column: camp_lodge

  - name: Airstrip operation events summary table
    id: airstrip_op_summary_table 
    task: summarize_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.capitalize_camp_lodge.return }}
      groupby_cols:
        - camp_lodge
        - arrival_departure
      summary_params:
        - display_name: no_of_clients 
          aggregator: sum 
          column: no_of_clients
          decimal_places: 0 
      reset_index: true

  - name: Pivot airstrip operations summary table 
    id: pivot_airstrip_ops
    task: pivot_df 
    partial: 
      df: ${{ workflow.airstrip_op_summary_table.return }}
      index_col: camp_lodge
      columns_col: arrival_departure 
      values_col: no_of_clients
      reset_idx: true 
  
  - name: Convert airstrip pivot table values to int 
    id: convert_pivot_int 
    task: convert_to_int 
    partial: 
      df: ${{ workflow.pivot_airstrip_ops.return }}
      columns: 
        - arrival
        - departure 
      errors: coerce 
      fill_value: 0 
      inplace: false 
  
  - name: Persist airstrip operations summary table
    id: persist_airstrip_operations 
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.convert_pivot_int.return }}
      filename: airstrip_operations_summary_table
  
  - name: Map airstrip maintenace columns 
    id: map_airstrip_maintenance
    task: map_columns 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      df: ${{ workflow.drop_airstrip_maintenance_prefix.return }}
      drop_columns: []
      retain_columns: [
        "date",
        "Maintenance type"
      ]
      rename_columns: {
        "Maintenance type":"maintenance_type"
        }
      raise_if_not_found: false

  - name: Persist airstrip maintenace summary table
    id: persist_airstrip_maintenance
    task: persist_df 
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filetype: csv
      df: ${{ workflow.map_airstrip_maintenance.return }}
      filename: airstrip_maintenance_summary_table 

    # Logistics - Airstirp complaints 
  - name: MNC event report dashboard
    id: mnc_events_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets: []
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}
      
